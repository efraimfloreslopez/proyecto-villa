    <!-- Scripts -->

    <script src="../static/js/admin-common.js"></script>

    <style>
        /* ========================================= */
        /* ESTILOS DEL ťRBOL DE ARCHIVOS - VS CODE */
        /* ========================================= */

        .file-tree {
            padding: 8px;
            color: #ccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
        }

        .tree-folder {
            margin-bottom: 2px;
        }

        .tree-folder-header {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: background 0.15s ease;
        }

        .tree-folder-header:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .tree-toggle {
            width: 16px;
            font-size: 10px;
            color: #888;
            flex-shrink: 0;
        }

        .tree-icon {
            margin-right: 6px;
            font-size: 14px;
            flex-shrink: 0;
        }

        .tree-label {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-count {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: #888;
            font-weight: normal;
        }

        .tree-content {
            margin-left: 8px;
            padding-left: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .tree-content.expanded {
            display: block;
        }

        .tree-item {
            padding: 5px 8px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            font-size: 13px;
            transition: background 0.15s ease;
        }

        .tree-item:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .tree-item.active {
            background-color: #0d6efd;
            color: white;
        }

        .tree-item.active .tree-icon {
            color: white !important;
            opacity: 1 !important;
        }

        /* Header del explorador */
        .file-browser-header {
            padding: 10px 12px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #888;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
        }

        /* El editor ocupa todo el espacio */
        #code-editor {
            width: 100%;
            height: 100%;
        }
    </style>
</body>
