<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Portal Institucional Municipal</title>
    <link rel="stylesheet" href="../static/css/global.css">
    <link rel="stylesheet" href="../static/css/login.css">
    <script src="../static/js/auth-demo.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <header class="login-header">
                <img src="../static/img/logo.svg" alt="Logo" class="login-logo">
                <h1>Acceso al Sistema</h1>
                <p>Portal Institucional Municipal — Demo</p>
            </header>

            <div class="demo-notice" style="background:#fff4e5;border-left:4px solid #ffa117;padding:15px;margin-bottom:20px;border-radius:4px;font-size:0.9rem;">
                <strong>Modo demostración:</strong> Los cambios no se guardan en producción.<br>
                Email: <code>admin@municipio.demo</code><br>
                Contraseña: <code>demo</code>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="admin@municipio.demo">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-login" id="submit-btn">Iniciar Sesión</button>
                <div id="error-message" style="color:#d32f2f;margin-top:15px;text-align:center;font-size:0.9rem;display:none;"></div>
            </form>

            <footer class="login-footer">
                <a href="index.html">← Volver al Portal Ciudadano</a>
            </footer>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const error = document.getElementById('error-message');
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            error.style.display = 'none';
            try {
                await Auth.login(document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = 'gestion-gobierno.html';
            } catch (err) {
                error.textContent = err.message;
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
